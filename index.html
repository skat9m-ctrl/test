<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест для любимой ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px 35px;
            max-width: 720px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(255, 105, 135, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            min-height: 400px;
            position: relative;
        }

        .page {
            display: none;
            animation: fadeInUp 0.5s ease;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.8rem;
            color: #c44b6c;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 4px 12px rgba(196, 75, 108, 0.15);
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #b05a77;
            font-weight: 600;
            background: rgba(255, 215, 225, 0.5);
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 0 auto 30px;
            backdrop-filter: blur(4px);
        }

        .title-desc {
            font-size: 1.2rem;
            color: #3d2a33;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #f68ca4, #e35f7a);
            border: none;
            padding: 16px 48px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            font-family: 'Quicksand', sans-serif;
            box-shadow: 0 10px 30px rgba(227, 95, 122, 0.3);
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: inline-block;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 14px 40px rgba(227, 95, 122, 0.45);
        }
        .btn:active { transform: scale(0.97); }

        .btn-center {
            text-align: center;
            margin-top: 20px;
        }

        /* Вопрос */
        .q-number {
            font-size: 0.9rem;
            font-weight: 700;
            color: #d4738e;
            background: rgba(255, 200, 215, 0.5);
            padding: 4px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .q-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #3d2a33;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 60px;
            padding: 14px 22px;
            border: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 500;
            color: #3d2a33;
            text-align: left;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #f6a0b5;
        }

        /* Поля ввода */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 20px 0;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-field label {
            font-weight: 600;
            color: #b05a77;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .input-field input {
            width: 80px;
            padding: 10px 12px;
            border-radius: 30px;
            border: 2px solid #f6a0b5;
            background: rgba(255,255,255,0.7);
            font-size: 1.2rem;
            text-align: center;
            font-family: 'Quicksand', sans-serif;
            transition: border 0.2s;
            outline: none;
        }
        .input-field input:focus {
            border-color: #e35f7a;
            box-shadow: 0 0 0 4px rgba(227,95,122,0.15);
        }

        /* Подпись под вопросом */
        .question-hint {
            text-align: center;
            color: #b05a77;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 16px;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        /* Страница результата */
        .result-icon {
            font-size: 4rem;
            text-align: center;
            margin: 5px 0;
        }
        .result-title {
            font-family: 'Pacifico', cursive;
            font-size: 2.4rem;
            text-align: center;
            color: #c44b6c;
        }
        .result-image {
            text-align: center;
            margin: 15px 0;
        }
        .result-image img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: 2px solid rgba(255,255,255,0.5);
            background: #fcdae6;
        }
        .result-comment {
            font-size: 1.15rem;
            text-align: center;
            color: #3d2a33;
            margin: 15px 0 25px;
            line-height: 1.5;
            background: rgba(255,215,225,0.2);
            padding: 12px 20px;
            border-radius: 30px;
        }
        .result-detail {
            background: rgba(255, 215, 225, 0.3);
            padding: 10px 18px;
            border-radius: 30px;
            text-align: center;
            font-weight: 600;
            color: #b05a77;
            margin-bottom: 20px;
        }

        /* Финальная страница */
        .final-score {
            font-size: 3rem;
            font-weight: 700;
            color: #c44b6c;
            text-align: center;
            margin: 20px 0;
        }
        .final-message {
            font-size: 1.3rem;
            text-align: center;
            line-height: 1.7;
            color: #3d2a33;
        }

        /* Прогресс */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #fcdae6;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f68ca4, #e35f7a);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* Декоративные сердечки */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        .floating-hearts span {
            position: absolute;
            display: block;
            font-size: 2rem;
            animation: floatHeart 12s infinite linear;
            opacity: 0.15;
        }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0.1; }
            50% { opacity: 0.25; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        @media (max-width: 600px) {
            .container { padding: 25px 18px; }
            h1 { font-size: 2rem; }
            .q-text { font-size: 1.2rem; }
            .btn { padding: 14px 28px; font-size: 1.1rem; }
            .option { padding: 12px 18px; font-size: 0.95rem; }
            .result-title { font-size: 1.8rem; }
            .input-field input { width: 65px; padding: 8px 10px; }
        }
    </style>
</head>
<body>

    <!-- Фоновые сердечки -->
    <div class="floating-hearts" id="heartsContainer"></div>

    <div class="container" id="app">
        <!-- Прогресс-бар -->
        <div class="progress-bar" id="progressWrap" style="display: none;">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>

        <!-- ===== ТИТУЛЬНАЯ СТРАНИЦА ===== -->
        <div class="page active" id="titlePage">
            <h1>💖 Тест для тебя</h1>
            <div style="text-align: center;">
                <span class="subtitle">✨ 10 вопросов о нас ✨</span>
            </div>
            <div class="title-desc">
                Привет, моя любимая! <br>
                Я подготовил для тебя 10 вопросов о нас. <br>
                Отвечай честно, и в конце узнаешь результат! ❤️
            </div>
            <div class="btn-center">
                <button class="btn" id="startBtn">Начать тест 🌸</button>
            </div>
        </div>

        <!-- ===== СТРАНИЦА ВОПРОСА ===== -->
        <div class="page" id="questionPage">
            <div class="q-number" id="qNumber">Вопрос 1 из 10</div>
            <div class="q-text" id="qText">Текст вопроса</div>
            <div id="questionContent"></div>
            <!-- Подпись под вопросом -->
            <div class="question-hint">✨ начнем с легкого ✨</div>
            <div class="btn-center" id="submitAnswerWrap" style="display: none;">
                <button class="btn" id="submitAnswerBtn">Ответить 💕</button>
            </div>
        </div>

        <!-- ===== СТРАНИЦА РЕЗУЛЬТАТА (правильно/неправильно) ===== -->
        <div class="page" id="resultPage">
            <div class="result-icon" id="resultIcon">✅</div>
            <div class="result-title" id="resultTitle">Правильно!</div>
            <div class="result-image" id="resultImageContainer">
                <img id="resultImage" src="" alt="Картинка">
            </div>
            <div class="result-comment" id="resultComment">Ваш комментарий</div>
            <div class="result-detail" id="resultDetail">Пояснение</div>
            <div class="btn-center">
                <button class="btn" id="nextBtn">Дальше ➜</button>
            </div>
        </div>

        <!-- ===== ФИНАЛЬНАЯ СТРАНИЦА ===== -->
        <div class="page" id="finalPage">
            <h1 style="font-size: 2.2rem;">💞 Ты справилась!</h1>
            <div class="final-score" id="finalScore">10 / 10</div>
            <div class="final-message" id="finalMessage">
                Ты — моя идеальная! ❤️
            </div>
            <div class="btn-center" style="margin-top: 25px;">
                <button class="btn" id="restartBtn">Пройти ещё раз 🌷</button>
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // 1. ВОПРОСЫ (замените на свои)
        // --------------------------------------------------------------
        const questions = [
            {
                type: 'input',   // 'input' или 'choice'
                question: "Когда мы встретились?",
                fields: [
                    { label: 'День', placeholder: 'ДД' },
                    { label: 'Месяц', placeholder: 'ММ' },
                    { label: 'Год', placeholder: 'ГГГГ' }
                ],
                correctValues: ['01', '12', '2023'],
                correctComment: 'Да, это тот самый день! ❤️',
                wrongComment: 'Ой, а я думал, что мы встретились именно тогда... Но ничего, главное, что мы вместе!'
            },
            {
                type: 'choice',
                question: "Какой у нас с тобой самый любимый совместный фильм?",
                options: ["Романтическая комедия", "Фэнтези", "Драма", "Мы смотрим всё подряд"],
                correct: 3,
                correctComment: 'Точно! Мы любим смотреть всё подряд и обсуждать! 🍿',
                wrongComment: 'Ну, может, в следующий раз угадаешь 😉'
            },
            {
                type: 'choice',
                question: "Что я люблю в тебе больше всего?",
                options: ["Твою улыбку", "Твой смех", "Твои глаза", "Твою доброту"],
                correct: 2,
                correctComment: 'Да, твои глаза завораживают меня каждый день ✨',
                wrongComment: 'На самом деле всё перечисленное, но глаза — особенно!'
            },
            {
                type: 'choice',
                question: "Наше идеальное свидание — это...",
                options: ["Уютный ужин при свечах", "Прогулка по парку", "Кино и попкорн", "Путешествие"],
                correct: 0,
                correctComment: 'Уютный ужин — это наша классика ❤️',
                wrongComment: 'Мы любим всё, но ужин при свечах — особенно!'
            },
            {
                type: 'choice',
                question: "Какое блюдо я готовлю лучше всего?",
                options: ["Паста", "Салат", "Десерт", "Я вообще не готовлю, но люблю твои"],
                correct: 2,
                correctComment: 'Ты обожаешь мои десерты! 😋',
                wrongComment: 'Ну, может, я и не мастер, но стараюсь!'
            }
            // ---- ДОБАВЬТЕ ОСТАЛЬНЫЕ 5 ВОПРОСОВ ПО АНАЛОГИИ ----
        ];

        // --------------------------------------------------------------
        // 2. СОСТОЯНИЕ
        // --------------------------------------------------------------
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let totalQuestions = questions.length;

        // DOM-элементы
        const titlePage = document.getElementById('titlePage');
        const questionPage = document.getElementById('questionPage');
        const resultPage = document.getElementById('resultPage');
        const finalPage = document.getElementById('finalPage');
        const progressWrap = document.getElementById('progressWrap');
        const progressFill = document.getElementById('progressFill');

        const qNumber = document.getElementById('qNumber');
        const qText = document.getElementById('qText');
        const questionContent = document.getElementById('questionContent');
        const submitAnswerWrap = document.getElementById('submitAnswerWrap');
        const submitAnswerBtn = document.getElementById('submitAnswerBtn');

        const resultIcon = document.getElementById('resultIcon');
        const resultTitle = document.getElementById('resultTitle');
        const resultImage = document.getElementById('resultImage');
        const resultComment = document.getElementById('resultComment');
        const resultDetail = document.getElementById('resultDetail');

        const finalScore = document.getElementById('finalScore');
        const finalMessage = document.getElementById('finalMessage');

        // Кнопки
        document.getElementById('startBtn').addEventListener('click', startQuiz);
        document.getElementById('nextBtn').addEventListener('click', nextQuestion);
        document.getElementById('restartBtn').addEventListener('click', restartQuiz);

        // --------------------------------------------------------------
        // 3. ФУНКЦИИ
        // --------------------------------------------------------------
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function updateProgress() {
            const percent = (currentQuestionIndex / totalQuestions) * 100;
            progressFill.style.width = percent + '%';
        }

        function startQuiz() {
            currentQuestionIndex = 0;
            correctCount = 0;
            progressWrap.style.display = 'block';
            showPage('questionPage');
            renderQuestion();
        }

        // Рендеринг вопроса
        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            qNumber.textContent = `Вопрос ${currentQuestionIndex + 1} из ${totalQuestions}`;
            qText.textContent = q.question;
            questionContent.innerHTML = '';

            if (q.type === 'choice') {
                // Варианты выбора
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                q.options.forEach((opt, index) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.textContent = opt;
                    div.dataset.index = index;
                    div.addEventListener('click', () => handleChoice(index));
                    optionsDiv.appendChild(div);
                });
                questionContent.appendChild(optionsDiv);
                submitAnswerWrap.style.display = 'none';
            } else if (q.type === 'input') {
                // Поля ввода
                const group = document.createElement('div');
                group.className = 'input-group';
                q.fields.forEach((field, idx) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'input-field';
                    const label = document.createElement('label');
                    label.textContent = field.label;
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = field.placeholder || '';
                    input.maxLength = 10;
                    input.dataset.idx = idx;
                    wrapper.appendChild(label);
                    wrapper.appendChild(input);
                    group.appendChild(wrapper);
                });
                questionContent.appendChild(group);
                submitAnswerWrap.style.display = 'block';
                submitAnswerBtn.onclick = handleInputSubmit;
            }

            updateProgress();
            showPage('questionPage');
        }

        // Обработчик для choice
        function handleChoice(selectedIndex) {
            const q = questions[currentQuestionIndex];
            const isCorrect = (selectedIndex === q.correct);
            if (isCorrect) correctCount++;
            showResultPage(isCorrect, q, q.options[selectedIndex], q.options[q.correct]);
        }

        // Обработчик для input
        function handleInputSubmit() {
            const q = questions[currentQuestionIndex];
            const inputs = questionContent.querySelectorAll('.input-field input');
            let userValues = [];
            let allFilled = true;
            inputs.forEach(inp => {
                const val = inp.value.trim();
                if (val === '') allFilled = false;
                userValues.push(val);
            });
            if (!allFilled) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }
            const isCorrect = userValues.every((val, idx) => val.toLowerCase() === q.correctValues[idx].toLowerCase());
            if (isCorrect) correctCount++;
            showResultPage(isCorrect, q, userValues.join(' '), q.correctValues.join(' '));
        }

        // Страница результата
        function showResultPage(isCorrect, question, userAnswer, correctAnswer) {
            const qNum = currentQuestionIndex + 1;

            if (isCorrect) {
                resultIcon.textContent = '✅';
                resultTitle.textContent = 'Правильно!';
                resultImage.src = `images/${qNum}y.png`;
                resultComment.textContent = question.correctComment || 'Отличный ответ!';
            } else {
                resultIcon.textContent = '❌';
                resultTitle.textContent = 'Неправильно...';
                resultImage.src = `images/${qNum}n.png`;
                resultComment.textContent = question.wrongComment || 'Ничего страшного, попробуем ещё раз!';
            }
            resultDetail.textContent = `Твой ответ: ${userAnswer}  |  Правильный ответ: ${correctAnswer}`;

            const nextBtn = document.getElementById('nextBtn');
            if (currentQuestionIndex === totalQuestions - 1) {
                nextBtn.textContent = 'Узнать результат 🎉';
            } else {
                nextBtn.textContent = 'Дальше ➜';
            }

            showPage('resultPage');
        }

        // Переход к следующему вопросу или финал
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestions) {
                renderQuestion();
            } else {
                showFinalPage();
            }
        }

        // Финальная страница
        function showFinalPage() {
            progressWrap.style.display = 'none';
            finalScore.textContent = `${correctCount} / ${totalQuestions}`;

            const percent = (correctCount / totalQuestions) * 100;
            let message = '';
            if (percent === 100) {
                message = '💖 Идеально! Ты знаешь меня лучше всех! Я тебя обожаю!';
            } else if (percent >= 70) {
                message = '💗 Очень хорошо! Мы так похожи! Ты — моя половинка!';
            } else if (percent >= 40) {
                message = '💕 Неплохо! Нам есть что узнать друг о друге, и это прекрасно!';
            } else {
                message = '🌷 Не беда! Главное, что мы вместе. Давай пройдём тест ещё раз?';
            }
            finalMessage.textContent = message;

            showPage('finalPage');
        }

        function restartQuiz() {
            startQuiz();
        }

        // --------------------------------------------------------------
        // 4. ДЕКОРАТИВНЫЕ СЕРДЕЧКИ
        // --------------------------------------------------------------
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const emojis = ['❤️', '💖', '💕', '💗', '💘', '💝'];
            for (let i = 0; i < 16; i++) {
                const span = document.createElement('span');
                span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDuration = (12 + Math.random() * 20) + 's';
                span.style.fontSize = (1.2 + Math.random() * 2.5) + 'rem';
                span.style.animationDelay = (Math.random() * 15) + 's';
                container.appendChild(span);
            }
        }
        createHearts();

        // --------------------------------------------------------------
        // 5. ИНИЦИАЛИЗАЦИЯ
        // --------------------------------------------------------------
        showPage('titlePage');
        console.log('💖 Тест готов! Положите картинки в папку images с именами 1y.png, 1n.png, 2y.png, ...');
    </script>
</body>
</html>
